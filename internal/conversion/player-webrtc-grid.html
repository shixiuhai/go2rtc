<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC 宫格多路播放器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00d9ff;
        }

        .header h1 {
            color: #00d9ff;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%);
            color: #000;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4757 0%, #cc3344 100%);
            color: #fff;
        }

        .main-container {
            display: flex;
            height: calc(100vh - 50px);
        }

        .sidebar {
            width: 300px;
            background: rgba(22, 33, 62, 0.9);
            border-right: 1px solid rgba(0, 217, 255, 0.2);
            padding: 15px;
            overflow-y: auto;
        }

        .sidebar-title {
            color: #00d9ff;
            font-size: 14px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 217, 255, 0.2);
        }

        .channel-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .channel-item {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(0, 217, 255, 0.2);
            border-radius: 6px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .channel-item:hover {
            background: rgba(0, 217, 255, 0.1);
            border-color: #00d9ff;
        }

        .channel-item.active {
            background: rgba(0, 217, 255, 0.2);
            border-color: #00d9ff;
        }

        .channel-name {
            color: #fff;
            font-size: 12px;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .channel-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            color: #888;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.active {
            background: #2ed573;
        }

        .video-area {
            flex: 1;
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-grid {
            display: grid;
            gap: 4px;
            width: 100%;
            height: 100%;
        }

        .video-cell {
            background: #000;
            border-radius: 4px;
            overflow: hidden;
            position: relative;
            border: 2px solid transparent;
        }

        .video-cell.active {
            border-color: #2ed573;
        }

        .video-cell video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .video-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            font-size: 10px;
            padding: 2px 6px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 12px;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(0, 217, 255, 0.3);
        }

        .modal-title {
            color: #00d9ff;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .grid-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .grid-btn {
            flex: 1;
            padding: 10px;
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            cursor: pointer;
            text-align: center;
        }

        .grid-btn.active {
            background: #00d9ff;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📺 WebRTC 宫格多路播放器 <span id="channelCount" style="font-size:12px;color:#888;">(0/16)</span></h1>
        <div class="header-controls">
            <input type="text" id="serverUrl" value="http://localhost:1984" placeholder="服务器地址" style="width:160px;padding:6px 10px;border:2px solid rgba(0,217,255,0.3);border-radius:6px;background:rgba(0,0,0,0.3);color:#fff;font-size:13px;">
            <button class="btn btn-primary" onclick="showAddModal()">➕ 添加通道</button>
            <button class="btn btn-primary" onclick="setGrid(4)" style="background:linear-gradient(135deg, #00b899 0%, #008766 100%);">2x2</button>
            <button class="btn btn-primary" onclick="setGrid(9)" style="background:linear-gradient(135deg, #00b899 0%, #008766 100%);">3x3</button>
            <button class="btn btn-primary" onclick="setGrid(16)" style="background:linear-gradient(135deg, #00b899 0%, #008766 100%);">4x4</button>
            <button class="btn btn-danger" onclick="stopAll()">⏹ 全部</button>
        </div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <div class="sidebar-title">📋 通道列表</div>
            <div class="channel-list" id="channelList"></div>
        </div>
        <div class="video-area">
            <div class="video-grid" id="videoGrid"></div>
        </div>
    </div>

    <!-- 添加通道模态框 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-title">📹 添加新通道</div>
            <input type="text" class="modal-input" id="rtspUrlInput" placeholder="输入 RTSP 地址">
            <div class="modal-actions">
                <button class="btn btn-danger" onclick="hideAddModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmAdd()">确定添加</button>
            </div>
        </div>
    </div>

    <script>
        const channels = new Map();
        let channelIdCounter = 0;
        let currentGridSize = 4;

        function getServerUrl() {
            return document.getElementById('serverUrl').value.trim().replace(/\/$/, '') || 'http://localhost:1984';
        }

        function showAddModal() {
            document.getElementById('addModal').classList.add('show');
            document.getElementById('rtspUrlInput').focus();
        }

        function hideAddModal() {
            document.getElementById('addModal').classList.remove('show');
            document.getElementById('rtspUrlInput').value = '';
        }

        function confirmAdd() {
            const rtspUrl = document.getElementById('rtspUrlInput').value.trim();
            if (!rtspUrl) {
                alert('请输入 RTSP 地址');
                return;
            }
            addChannel(rtspUrl);
            hideAddModal();
        }

        function setGrid(size) {
            currentGridSize = size;
            const cols = Math.sqrt(size);
            const grid = document.getElementById('videoGrid');
            grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            grid.style.gridTemplateRows = `repeat(${cols}, 1fr)`;
            renderGrid();
        }

        function addChannel(rtspUrl) {
            const serverUrl = getServerUrl();
            const channelId = 'ch_' + (++channelIdCounter);

            fetch(`${serverUrl}/api/rtsp/flv/add`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ path: rtspUrl })
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 200) {
                    channels.set(channelId, {
                        taskId: data.taskId,
                        rtspUrl: rtspUrl,
                        pc: null,
                        ws: null
                    });
                    renderChannelList();
                    renderGrid();
                    startPlayback(channelId, data.taskId);
                    updateCount();
                } else {
                    alert('添加失败：' + data.result);
                }
            })
            .catch(err => {
                alert('请求失败：' + err.message);
            });
        }

        function renderChannelList() {
            const list = document.getElementById('channelList');
            list.innerHTML = '';

            channels.forEach((data, channelId) => {
                const item = document.createElement('div');
                item.className = 'channel-item';
                item.innerHTML = `
                    <div class="channel-name">${channelId}</div>
                    <div class="channel-status">
                        <div class="status-dot" id="status-${channelId}"></div>
                        <span>${data.rtspUrl}</span>
                    </div>
                `;
                item.onclick = () => focusChannel(channelId);
                list.appendChild(item);
            });
        }

        function renderGrid() {
            const grid = document.getElementById('videoGrid');
            grid.innerHTML = '';

            const channelArray = Array.from(channels.entries());
            for (let i = 0; i < currentGridSize; i++) {
                const cell = document.createElement('div');
                cell.className = 'video-cell';
                cell.id = `cell-${i}`;

                const video = document.createElement('video');
                video.id = `video-${i}`;
                video.autoplay = true;
                video.muted = true;
                video.playsInline = true;

                const label = document.createElement('div');
                label.className = 'video-label';
                label.textContent = channelArray[i] ? channelArray[i][0] : '空闲';

                cell.appendChild(video);
                cell.appendChild(label);
                grid.appendChild(cell);
            }
        }

        function startPlayback(channelId, taskId) {
            const streamName = 'conv_' + taskId;
            const wsUrl = `ws://${window.location.host}/api/ws?src=${streamName}`;

            const pc = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun.cloudflare.com:3478' }
                ]
            });

            let ws = null;
            let assignedCell = -1;

            // 分配单元格
            channels.forEach((data, id) => {
                if (id === channelId) {
                    const index = Array.from(channels.keys()).indexOf(channelId);
                    if (index < currentGridSize) {
                        assignedCell = index;
                    }
                }
            });

            pc.ontrack = (event) => {
                if (assignedCell >= 0) {
                    const video = document.getElementById(`video-${assignedCell}`);
                    if (video) {
                        video.srcObject = event.streams[0];
                        video.play().catch(() => {});
                    }
                    const statusDot = document.getElementById(`status-${channelId}`);
                    if (statusDot) {
                        statusDot.classList.add('active');
                    }
                    const cell = document.getElementById(`cell-${assignedCell}`);
                    if (cell) {
                        cell.classList.add('active');
                    }
                }
            };

            pc.onicecandidate = (event) => {
                if (event.candidate && ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'webrtc/candidate',
                        value: event.candidate.candidate
                    }));
                }
            };

            ws = new WebSocket(wsUrl);

            ws.onopen = async () => {
                const offer = await pc.createOffer({
                    offerToReceiveVideo: true,
                    offerToReceiveAudio: false
                });
                await pc.setLocalDescription(offer);

                ws.send(JSON.stringify({
                    type: 'webrtc',
                    value: {
                        type: 'offer',
                        sdp: pc.localDescription.sdp
                    }
                }));
            };

            ws.onmessage = async (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    if (msg.type === 'webrtc' && msg.value.type === 'answer') {
                        await pc.setRemoteDescription(new RTCSessionDescription(msg.value));
                    } else if (msg.type === 'webrtc/candidate') {
                        await pc.addIceCandidate(new RTCIceCandidate({ candidate: msg.value }));
                    }
                } catch (err) {
                    console.error('处理消息失败:', err);
                }
            };

            const channelData = channels.get(channelId);
            if (channelData) {
                channelData.pc = pc;
                channelData.ws = ws;
            }
        }

        function stopAll() {
            if (!confirm('确定要停止所有通道吗？')) return;

            channels.forEach((data, channelId) => {
                if (data.taskId) {
                    fetch(`${getServerUrl()}/api/rtsp/flv/delete`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ taskId: data.taskId })
                    }).catch(console.error);
                }
                if (data.ws) data.ws.close();
                if (data.pc) data.pc.close();
            });

            channels.clear();
            channelIdCounter = 0;
            renderChannelList();
            renderGrid();
            updateCount();
        }

        function focusChannel(channelId) {
            // 可以扩展到点击通道在某个位置显示
            console.log('聚焦通道:', channelId);
        }

        function updateCount() {
            document.getElementById('channelCount').textContent = `(${channels.size}/${currentGridSize})`;
        }

        window.addEventListener('beforeunload', () => {
            channels.forEach((data) => {
                if (data.ws) data.ws.close();
                if (data.pc) data.pc.close();
            });
            channels.clear();
        });

        // 初始化
        setGrid(4);
    </script>
</body>
</html>
