<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTSP 转 FLV 多路播放器</title>
    <script src="https://cdn.jsdelivr.net/npm/flv.js@1.6.2/dist/flv.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00d9ff;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }

        .panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .panel-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: #00d9ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #00d9ff;
            border-radius: 2px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-group input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00d9ff;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%);
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4757 0%, #cc3344 100%);
            color: #fff;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 71, 87, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #2ed573 0%, #1ea055 100%);
            color: #fff;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(46, 213, 115, 0.4);
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffa502 0%, #cc8400 100%);
            color: #000;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* 多路播放网格 */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .video-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(0, 217, 255, 0.2);
            transition: all 0.3s;
        }

        .video-card:hover {
            border-color: #00d9ff;
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.3);
        }

        .video-card.active {
            border-color: #2ed573;
            box-shadow: 0 0 20px rgba(46, 213, 115, 0.3);
        }

        .video-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-title {
            font-size: 14px;
            font-weight: 600;
            color: #00d9ff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .video-actions {
            display: flex;
            gap: 8px;
        }

        .video-body {
            position: relative;
            background: #000;
        }

        .video-body video {
            width: 100%;
            height: auto;
            display: block;
        }

        .video-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            background: rgba(0, 0, 0, 0.3);
            font-size: 12px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.active {
            background: #2ed573;
            animation: pulse 2s infinite;
        }

        .status-dot.error {
            background: #ff4757;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .task-list {
            display: grid;
            gap: 10px;
        }

        .task-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-info {
            flex: 1;
        }

        .task-id {
            color: #00d9ff;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .task-path {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            word-break: break-all;
        }

        .task-actions {
            display: flex;
            gap: 10px;
            margin-left: 15px;
        }

        .config-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .config-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .config-item label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        .config-item input {
            padding: 10px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
        }

        .config-item input:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .log-container {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-info { color: #00d9ff; }
        .log-success { color: #2ed573; }
        .log-error { color: #ff4757; }
        .log-warning { color: #ffa502; }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.5);
            grid-column: 1 / -1;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            flex: 1;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #00d9ff;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #ff4757;
            cursor: pointer;
            font-size: 18px;
            padding: 0 5px;
            transition: all 0.3s;
        }

        .close-btn:hover {
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📺 RTSP 转 FLV 多路播放器</h1>

        <!-- 统计栏 -->
        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="playingCount">0</div>
                <div class="stat-label">正在播放</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalTasks">0</div>
                <div class="stat-label">总任务数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="serverStatus">-</div>
                <div class="stat-label">服务状态</div>
            </div>
        </div>

        <!-- 配置面板 -->
        <div class="panel">
            <div class="panel-title">服务配置</div>
            <div class="config-section">
                <div class="config-item">
                    <label>go2rtc 服务地址</label>
                    <input type="text" id="serverUrl" value="http://localhost:1984" placeholder="http://localhost:1984">
                </div>
                <div class="config-item">
                    <label>保活间隔 (秒)</label>
                    <input type="number" id="keepAliveInterval" value="25" min="10" max="60">
                </div>
            </div>
        </div>

        <!-- 添加任务面板 -->
        <div class="panel">
            <div class="panel-title">添加转换任务</div>
            <div class="input-group">
                <input type="text" id="rtspUrl" placeholder="rtsp://192.168.6.2:8080/h264.sdp" 
                       value="rtsp://192.168.6.2:8080/h264.sdp">
                <button class="btn btn-primary" onclick="addTask()" id="addBtn">
                    ➕ 添加路
                </button>
            </div>
        </div>

        <!-- 播放网格 -->
        <div class="panel">
            <div class="panel-title">
                播放窗口
                <button class="btn btn-small btn-warning" onclick="stopAll()" style="margin-left: auto;">
                    ⏹ 全部停止
                </button>
            </div>
            <div id="videoGrid" class="video-grid">
                <div class="empty-state">
                    <div class="empty-state-icon">📹</div>
                    <div>暂无播放窗口，点击上方"添加路"按钮添加 RTSP 流</div>
                </div>
            </div>
        </div>

        <!-- 任务列表面板 -->
        <div class="panel">
            <div class="panel-title">
                任务列表
                <button class="btn btn-small btn-primary" onclick="loadTaskList()" style="margin-left: auto;">
                    🔄 刷新
                </button>
            </div>
            <div id="taskList" class="task-list">
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <div>暂无任务</div>
                </div>
            </div>
        </div>

        <!-- 日志面板 -->
        <div class="panel">
            <div class="panel-title">运行日志</div>
            <div class="log-container" id="logContainer"></div>
        </div>
    </div>

    <script>
        // 全局状态 - 支持多路
        const players = new Map(); // taskId -> { flvPlayer, keepAliveTimer, rtspUrl, flvUrl }

        // 日志函数
        function log(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const now = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${now}] ${message}`;
            container.insertBefore(entry, container.firstChild);
            
            while (container.children.length > 100) {
                container.removeChild(container.lastChild);
            }
        }

        function getServerUrl() {
            return document.getElementById('serverUrl').value.replace(/\/$/, '');
        }

        // 更新统计
        function updateStats() {
            const playingCount = players.size;
            document.getElementById('playingCount').textContent = playingCount;
            document.getElementById('totalTasks').textContent = playingCount;
        }

        // 生成视频卡片 HTML
        function createVideoCard(taskId, rtspUrl) {
            return `
                <div class="video-card" id="card-${taskId}" data-task-id="${taskId}">
                    <div class="video-header">
                        <div class="video-title" title="${rtspUrl}">📹 ${taskId}</div>
                        <div class="video-actions">
                            <button class="btn btn-small btn-success" onclick="togglePlay('${taskId}')" id="playBtn-${taskId}">
                                ▶ 播放
                            </button>
                            <button class="btn btn-small btn-warning" onclick="keepAliveTask('${taskId}')">
                                💓 保活
                            </button>
                            <button class="close-btn" onclick="removeCard('${taskId}')" title="关闭">✕</button>
                        </div>
                    </div>
                    <div class="video-body">
                        <video id="video-${taskId}" controls autoplay muted></video>
                    </div>
                    <div class="video-status">
                        <div class="status-indicator">
                            <div class="status-dot" id="statusDot-${taskId}"></div>
                            <span id="statusText-${taskId}">未播放</span>
                        </div>
                        <span style="color: rgba(255,255,255,0.5); font-size: 11px;">${rtspUrl}</span>
                    </div>
                </div>
            `;
        }

        // 添加任务
        async function addTask() {
            const rtspUrl = document.getElementById('rtspUrl').value.trim();
            if (!rtspUrl) {
                log('请输入 RTSP 地址', 'error');
                return;
            }

            const serverUrl = getServerUrl();
            const addBtn = document.getElementById('addBtn');
            addBtn.disabled = true;
            addBtn.textContent = '⏳ 添加中...';

            try {
                log(`正在添加任务：${rtspUrl}`, 'info');
                
                const response = await fetch(`${serverUrl}/api/rtsp/flv/add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: rtspUrl })
                });

                const data = await response.json();

                if (data.code === 200) {
                    log(`任务添加成功！Task ID: ${data.taskId}`, 'success');
                    
                    // 添加视频卡片
                    addVideoCard(data.taskId, rtspUrl, data.flvUrl);
                    
                    // 自动开始播放
                    startPlayback(data.taskId, data.flvUrl);
                    
                    // 启动保活
                    startKeepAlive(data.taskId);
                    
                    updateStats();
                    loadTaskList();
                } else {
                    log(`任务添加失败：${data.result}`, 'error');
                }
            } catch (error) {
                log(`请求失败：${error.message}`, 'error');
            } finally {
                addBtn.disabled = false;
                addBtn.textContent = '➕ 添加路';
            }
        }

        // 添加视频卡片
        function addVideoCard(taskId, rtspUrl, flvUrl) {
            const grid = document.getElementById('videoGrid');
            
            // 移除空状态
            const emptyState = grid.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            // 检查是否已存在
            if (document.getElementById(`card-${taskId}`)) {
                log(`卡片已存在：${taskId}`, 'warning');
                return;
            }

            grid.insertAdjacentHTML('beforeend', createVideoCard(taskId, rtspUrl));
            log(`视频卡片已添加：${taskId}`, 'success');
        }

        // 开始播放指定任务
        function startPlayback(taskId, flvUrl) {
            const serverUrl = getServerUrl();
            const fullUrl = `${serverUrl}${flvUrl}`;
            const videoElement = document.getElementById(`video-${taskId}`);
            const statusDot = document.getElementById(`statusDot-${taskId}`);
            const statusText = document.getElementById(`statusText-${taskId}`);
            const playBtn = document.getElementById(`playBtn-${taskId}`);
            const card = document.getElementById(`card-${taskId}`);

            if (!flvjs.isSupported()) {
                log('flv.js 不支持当前浏览器', 'error');
                return;
            }

            // 如果已有播放器，先销毁
            if (players.has(taskId)) {
                stopPlayback(taskId);
            }

            const flvPlayer = flvjs.createPlayer({
                type: 'flv',
                url: fullUrl,
                hasAudio: false,
                isLive: true,
                enableStashBuffer: false
            });

            flvPlayer.attachMediaElement(videoElement);
            
            flvPlayer.on('error', (error) => {
                log(`播放器错误 [${taskId}]: ${error}`, 'error');
                statusDot.className = 'status-dot error';
                statusText.textContent = '播放错误';
            });

            flvPlayer.on('status_changed', (status) => {
                if (status === 'running') {
                    statusDot.className = 'status-dot active';
                    statusText.textContent = '播放中';
                    card.classList.add('active');
                    if (playBtn) playBtn.textContent = '⏸ 暂停';
                }
            });

            try {
                flvPlayer.load();
                flvPlayer.play();
                log(`播放已开始 [${taskId}]`, 'success');
                
                players.set(taskId, {
                    flvPlayer,
                    rtspUrl,
                    flvUrl,
                    keepAliveTimer: null
                });
            } catch (error) {
                log(`播放失败 [${taskId}]: ${error.message}`, 'error');
            }
        }

        // 停止播放指定任务
        function stopPlayback(taskId) {
            const playerData = players.get(taskId);
            if (playerData && playerData.flvPlayer) {
                playerData.flvPlayer.pause();
                playerData.flvPlayer.unload();
                playerData.flvPlayer.detachMediaElement();
                playerData.flvPlayer.destroy();
            }
            players.delete(taskId);
        }

        // 切换播放/暂停
        function togglePlay(taskId) {
            const playerData = players.get(taskId);
            const playBtn = document.getElementById(`playBtn-${taskId}`);
            const statusText = document.getElementById(`statusText-${taskId}`);

            if (playerData && playerData.flvPlayer) {
                if (playerData.flvPlayer.mediaElement.paused) {
                    playerData.flvPlayer.play();
                    if (playBtn) playBtn.textContent = '⏸ 暂停';
                    statusText.textContent = '播放中';
                } else {
                    playerData.flvPlayer.pause();
                    if (playBtn) playBtn.textContent = '▶ 播放';
                    statusText.textContent = '已暂停';
                }
            } else {
                // 重新播放
                const flvUrl = playerData ? playerData.flvUrl : null;
                if (flvUrl) {
                    startPlayback(taskId, flvUrl);
                }
            }
        }

        // 启动保活定时器
        function startKeepAlive(taskId) {
            stopKeepAlive(taskId);
            
            const interval = parseInt(document.getElementById('keepAliveInterval').value) * 1000;
            
            const timer = setInterval(async () => {
                if (players.has(taskId)) {
                    await keepAliveRequest(taskId);
                } else {
                    clearInterval(timer);
                }
            }, interval);

            const playerData = players.get(taskId);
            if (playerData) {
                playerData.keepAliveTimer = timer;
            }
        }

        // 停止保活定时器
        function stopKeepAlive(taskId) {
            const playerData = players.get(taskId);
            if (playerData && playerData.keepAliveTimer) {
                clearInterval(playerData.keepAliveTimer);
                playerData.keepAliveTimer = null;
            }
        }

        // 保活请求
        async function keepAliveRequest(taskId) {
            const serverUrl = getServerUrl();
            
            try {
                const response = await fetch(`${serverUrl}/api/rtsp/flv/keepLive`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ taskId })
                });

                const data = await response.json();
                if (data.code !== 200) {
                    log(`保活失败 [${taskId}]: ${data.result}`, 'warning');
                }
            } catch (error) {
                log(`保活请求失败 [${taskId}]: ${error.message}`, 'error');
            }
        }

        // 手动保活
        async function keepAliveTask(taskId) {
            log(`手动保活任务：${taskId}`, 'info');
            await keepAliveRequest(taskId);
        }

        // 移除卡片
        async function removeCard(taskId) {
            if (!confirm(`确定要停止并删除任务 ${taskId} 吗？`)) return;

            const serverUrl = getServerUrl();
            
            try {
                // 删除服务端任务
                await fetch(`${serverUrl}/api/rtsp/flv/delete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ taskId })
                });
            } catch (error) {
                log(`删除请求失败：${error.message}`, 'error');
            }

            // 停止播放
            stopPlayback(taskId);
            stopKeepAlive(taskId);

            // 移除卡片
            const card = document.getElementById(`card-${taskId}`);
            if (card) {
                card.remove();
            }

            log(`任务已删除：${taskId}`, 'success');
            updateStats();
            loadTaskList();

            // 如果无播放窗口，显示空状态
            const grid = document.getElementById('videoGrid');
            if (grid.children.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📹</div>
                        <div>暂无播放窗口，点击上方"添加路"按钮添加 RTSP 流</div>
                    </div>
                `;
            }
        }

        // 全部停止
        async function stopAll() {
            if (!confirm('确定要停止所有播放吗？')) return;

            const taskIds = Array.from(players.keys());
            for (const taskId of taskIds) {
                await removeCard(taskId);
            }
        }

        // 加载任务列表
        async function loadTaskList() {
            const serverUrl = getServerUrl();
            const taskListEl = document.getElementById('taskList');

            try {
                const response = await fetch(`${serverUrl}/api/rtsp/flv/list`);
                const data = await response.json();

                if (data.code === 200 && data.num > 0) {
                    let html = '';
                    for (const [taskId, info] of Object.entries(data.taskDict)) {
                        const expires = new Date(info.expires * 1000).toLocaleString();
                        html += `
                            <div class="task-item">
                                <div class="task-info">
                                    <div class="task-id">📌 ${taskId}</div>
                                    <div class="task-path">${info.rtspPath}</div>
                                    <div class="task-path">过期时间：${expires}</div>
                                </div>
                                <div class="task-actions">
                                    <button class="btn btn-small btn-success" onclick="focusCard('${taskId}')">
                                        📺 聚焦
                                    </button>
                                    <button class="btn btn-small btn-warning" onclick="keepAliveTask('${taskId}')">
                                        💓 保活
                                    </button>
                                    <button class="btn btn-small btn-danger" onclick="removeCard('${taskId}')">
                                        🗑 删除
                                    </button>
                                </div>
                            </div>
                        `;
                    }
                    taskListEl.innerHTML = html;
                    log(`已加载 ${data.num} 个任务`, 'success');
                } else {
                    taskListEl.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📋</div>
                            <div>暂无任务</div>
                        </div>
                    `;
                }
            } catch (error) {
                log(`加载任务列表失败：${error.message}`, 'error');
            }
        }

        // 聚焦指定卡片
        function focusCard(taskId) {
            const card = document.getElementById(`card-${taskId}`);
            if (card) {
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                card.style.borderColor = '#00d9ff';
                setTimeout(() => {
                    card.style.borderColor = '';
                }, 2000);
            }
        }

        // 页面卸载时清理
        window.addEventListener('beforeunload', () => {
            players.forEach((playerData, taskId) => {
                if (playerData.flvPlayer) {
                    playerData.flvPlayer.destroy();
                }
                if (playerData.keepAliveTimer) {
                    clearInterval(playerData.keepAliveTimer);
                }
            });
            players.clear();
        });

        // 检查服务状态
        async function checkServerStatus() {
            const serverUrl = getServerUrl();
            try {
                const response = await fetch(`${serverUrl}/api/health`);
                const data = await response.json();
                document.getElementById('serverStatus').textContent = data.status || 'OK';
                document.getElementById('serverStatus').style.color = '#2ed573';
            } catch (error) {
                document.getElementById('serverStatus').textContent = '离线';
                document.getElementById('serverStatus').style.color = '#ff4757';
            }
        }

        // 初始化
        log('多路播放器已初始化', 'success');
        log(`默认服务地址：${getServerUrl()}`, 'info');
        checkServerStatus();
        setInterval(checkServerStatus, 30000); // 每 30 秒检查服务状态
        loadTaskList();
    </script>
</body>
</html>
