<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC 多窗口大屏监控</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a1a;
            min-height: 100vh;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00d9ff;
        }

        .header h1 {
            color: #00d9ff;
            font-size: 18px;
            text-shadow: 0 0 10px rgba(0, 217, 255, 0.5);
        }

        .header-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .layout-selector {
            display: flex;
            gap: 5px;
        }

        .layout-btn {
            padding: 6px 12px;
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 4px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            cursor: pointer;
            font-size: 12px;
        }

        .layout-btn.active {
            background: #00d9ff;
            color: #000;
        }

        .header-controls input {
            padding: 8px 12px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 13px;
            width: 180px;
        }

        .header-controls input:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%);
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 217, 255, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #00b899 0%, #008766 100%);
            color: #fff;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4757 0%, #cc3344 100%);
            color: #fff;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 8px;
            padding: 8px;
            height: calc(100vh - 50px);
            overflow-y: auto;
        }

        .grid-container.compact {
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 4px;
        }

        .grid-container.ultra {
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 2px;
        }

        .window {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(0, 217, 255, 0.2);
            display: flex;
            flex-direction: column;
            min-height: 150px;
        }

        .window.active {
            border-color: #2ed573;
            box-shadow: 0 0 15px rgba(46, 213, 115, 0.3);
        }

        .window-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.6);
            border-bottom: 1px solid rgba(0, 217, 255, 0.2);
        }

        .window-title {
            font-size: 12px;
            color: #00d9ff;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }

        .window-actions {
            display: flex;
            gap: 6px;
        }

        .btn-icon {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .btn-play {
            background: #2ed573;
            color: #fff;
        }

        .btn-delete {
            background: rgba(255, 255, 255, 0.1);
            color: #ff4757;
        }

        .window-body {
            flex: 1;
            position: relative;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .window-body video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .window-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.4);
            font-size: 11px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.active {
            background: #2ed573;
            animation: pulse 2s infinite;
        }

        .status-dot.connecting {
            background: #ffa502;
            animation: pulse 1s infinite;
        }

        .status-dot.error {
            background: #ff4757;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .spinner {
            width: 30px;
            height: 30px;
            border: 3px solid rgba(0, 217, 255, 0.3);
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .add-window-card {
            background: rgba(0, 217, 255, 0.1);
            border: 2px dashed rgba(0, 217, 255, 0.3);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 150px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .add-window-card:hover {
            background: rgba(0, 217, 255, 0.15);
            border-color: #00d9ff;
        }

        .add-icon {
            font-size: 40px;
            color: #00d9ff;
            margin-bottom: 10px;
        }

        .add-text {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 12px;
            padding: 25px;
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(0, 217, 255, 0.3);
        }

        .modal-title {
            color: #00d9ff;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .modal-input:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            z-index: 2000;
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            background: #2ed573;
        }

        .toast.error {
            background: #ff4757;
        }

        .toast.warning {
            background: #ffa502;
        }

        .toast.info {
            background: #00d9ff;
            color: #000;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📺 WebRTC 多窗口大屏 <span id="windowCount" style="font-size:12px;color:#888;">(0 路)</span></h1>
        <div class="header-controls">
            <div class="layout-selector">
                <button class="layout-btn active" onclick="setLayout('normal')">标准</button>
                <button class="layout-btn" onclick="setLayout('compact')">紧凑</button>
                <button class="layout-btn" onclick="setLayout('ultra')">密集</button>
            </div>
            <input type="text" id="serverUrl" value="http://localhost:1984" placeholder="服务器地址">
            <button class="btn btn-primary" onclick="showAddModal()">➕ 添加</button>
            <button class="btn btn-success" onclick="showBatchModal()">📋 批量</button>
            <button class="btn btn-danger" onclick="stopAll()">⏹ 全部</button>
        </div>
    </div>

    <div class="grid-container" id="gridContainer"></div>

    <!-- 添加窗口模态框 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <div class="modal-title">📹 添加新窗口</div>
            <input type="text" class="modal-input" id="rtspUrlInput" placeholder="输入 RTSP 地址" value="rtsp://192.168.6.2:8080/h264.sdp">
            <div class="modal-actions">
                <button class="btn btn-danger" onclick="hideAddModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmAdd()">确定添加</button>
            </div>
        </div>
    </div>

    <!-- 批量添加模态框 -->
    <div class="modal" id="batchModal">
        <div class="modal-content" style="max-width:600px;">
            <div class="modal-title">📋 批量添加窗口</div>
            <textarea class="modal-input" id="batchRtspInput" placeholder="每行一个 RTSP 地址" rows="10" style="width:100%;min-height:200px;font-family:monospace;resize:vertical;"></textarea>
            <div style="margin-bottom:10px;font-size:12px;color:#888;">
                示例：<br>
                rtsp://192.168.1.100:554/stream1<br>
                rtsp://192.168.1.100:554/stream2<br>
                rtsp://192.168.1.100:554/stream3
            </div>
            <div class="modal-actions">
                <button class="btn btn-danger" onclick="hideBatchModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmBatchAdd()">确定批量添加</button>
            </div>
        </div>
    </div>

    <script>
        const windows = new Map();
        let windowIdCounter = 0;
        let isConnected = false;

        function getServerUrl() {
            const custom = document.getElementById('serverUrl').value.trim();
            if (custom) {
                return custom.replace(/\/$/, '');
            }
            return 'http://localhost:1984';
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function log(message, type = 'info') {
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        function setLayout(layout) {
            const container = document.getElementById('gridContainer');
            container.className = 'grid-container ' + layout;
            
            document.querySelectorAll('.layout-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function updateWindowCount() {
            document.getElementById('windowCount').textContent = `(${windows.size}路)`;
        }

        function showAddModal() {
            document.getElementById('addModal').classList.add('show');
            document.getElementById('rtspUrlInput').focus();
        }

        function hideAddModal() {
            document.getElementById('addModal').classList.remove('show');
            document.getElementById('rtspUrlInput').value = 'rtsp://192.168.6.2:8080/h264.sdp';
        }

        function confirmAdd() {
            const rtspUrl = document.getElementById('rtspUrlInput').value.trim();
            if (!rtspUrl) {
                showToast('请输入 RTSP 地址', 'error');
                return;
            }
            addWindow(rtspUrl);
            hideAddModal();
        }

        function showBatchModal() {
            document.getElementById('batchModal').classList.add('show');
            document.getElementById('batchRtspInput').focus();
        }

        function hideBatchModal() {
            document.getElementById('batchModal').classList.remove('show');
            document.getElementById('batchRtspInput').value = '';
        }

        async function confirmBatchAdd() {
            const text = document.getElementById('batchRtspInput').value.trim();
            if (!text) {
                showToast('请输入 RTSP 地址', 'error');
                return;
            }

            const urls = text.split('\n').map(u => u.trim()).filter(u => u);
            if (urls.length === 0) {
                showToast('没有有效的 RTSP 地址', 'error');
                return;
            }

            hideBatchModal();
            showToast(`开始添加 ${urls.length} 个窗口`, 'info');

            for (let i = 0; i < urls.length; i++) {
                addWindow(urls[i]);
                await new Promise(resolve => setTimeout(resolve, 100));
            }
        }

        function createWindowElement(windowId, rtspUrl) {
            return `
                <div class="window" id="window-${windowId}" data-window-id="${windowId}">
                    <div class="window-header">
                        <div class="window-title" title="${rtspUrl}">📹 ${windowId}</div>
                        <div class="window-actions">
                            <button class="btn-icon btn-play" onclick="togglePlay('${windowId}')" title="播放/暂停">▶</button>
                            <button class="btn-icon btn-delete" onclick="removeWindow('${windowId}')" title="删除">✕</button>
                        </div>
                    </div>
                    <div class="window-body">
                        <video id="video-${windowId}" autoplay muted playsinline></video>
                        <div class="loading-overlay hidden" id="loading-${windowId}">
                            <div class="spinner"></div>
                        </div>
                    </div>
                    <div class="window-status">
                        <div class="status-indicator">
                            <div class="status-dot" id="statusDot-${windowId}"></div>
                            <span id="statusText-${windowId}">未播放</span>
                        </div>
                        <span style="color: rgba(255,255,255,0.5); font-size: 10px;" title="${rtspUrl}">${rtspUrl.substring(0, 30)}...</span>
                    </div>
                </div>
            `;
        }

        async function addWindow(rtspUrl) {
            const serverUrl = getServerUrl();
            const windowId = 'win_' + (++windowIdCounter);

            try {
                const response = await fetch(`${serverUrl}/api/rtsp/flv/add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: rtspUrl })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();

                if (data.code === 200) {
                    const container = document.getElementById('gridContainer');
                    const addCard = container.querySelector('.add-window-card');
                    if (addCard) addCard.remove();

                    container.insertAdjacentHTML('beforeend', createWindowElement(windowId, rtspUrl));
                    
                    startPlayback(windowId, data.taskId, rtspUrl);
                    startKeepAlive(windowId, data.taskId);
                    
                    windows.set(windowId, {
                        taskId: data.taskId,
                        rtspUrl: rtspUrl,
                        pc: null,
                        ws: null,
                        keepAliveTimer: null
                    });

                    updateLayout();
                    updateWindowCount();
                    showToast(`已添加：${windowId}`, 'success');
                } else {
                    showToast(`添加失败：${data.result}`, 'error');
                }
            } catch (error) {
                showToast(`请求失败：${error.message}`, 'error');
                windowIdCounter--;
            }
        }

        function startPlayback(windowId, taskId, rtspUrl) {
            const videoElement = document.getElementById(`video-${windowId}`);
            const statusDot = document.getElementById(`statusDot-${windowId}`);
            const statusText = document.getElementById(`statusText-${windowId}`);
            const loading = document.getElementById(`loading-${windowId}`);
            const windowEl = document.getElementById(`window-${windowId}`);

            const streamName = 'conv_' + taskId;
            const baseServerUrl = getServerUrl();
            const serverUrl = baseServerUrl.replace('http://', 'ws://').replace('https://', 'wss://');
            const wsUrl = `${serverUrl}/api/ws?src=${streamName}`;
            
            log(`WebSocket 地址：${wsUrl}`, 'info');
            
            const pc = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun.cloudflare.com:3478' }
                ],
                sdpSemantics: 'unified-plan'
            });
            
            pc.addTransceiver('video', { direction: 'recvonly' });

            let ws = null;
            let reconnectAttempts = 0;
            const maxReconnectAttempts = 3;

            loading.classList.remove('hidden');
            statusDot.className = 'status-dot connecting';
            statusText.textContent = '连接中...';

            pc.ontrack = (event) => {
                log(`收到视频流 [${windowId}]`, 'success');
                videoElement.srcObject = event.streams[0];
                videoElement.play().catch(() => {});
                loading.classList.add('hidden');
                statusDot.className = 'status-dot active';
                statusText.textContent = '播放中';
                windowEl.classList.add('active');
            };

            pc.onicecandidate = (event) => {
                if (event.candidate && ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'webrtc/candidate',
                        value: event.candidate.candidate
                    }));
                }
            };

            pc.onconnectionstatechange = () => {
                log(`连接状态 [${windowId}]: ${pc.connectionState}`, 'info');
                if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
                    loading.classList.add('hidden');
                    statusDot.className = 'status-dot error';
                    statusText.textContent = '连接失败';
                    windowEl.classList.remove('active');
                    
                    if (reconnectAttempts < maxReconnectAttempts) {
                        reconnectAttempts++;
                        log(`尝试重连 [${windowId}] ${reconnectAttempts}/${maxReconnectAttempts}`, 'warning');
                        setTimeout(() => startPlayback(windowId, taskId, rtspUrl), 2000 * reconnectAttempts);
                    }
                } else if (pc.connectionState === 'connected') {
                    loading.classList.add('hidden');
                    statusDot.className = 'status-dot active';
                    statusText.textContent = '播放中';
                }
            };

            ws = new WebSocket(wsUrl);
            log(`正在连接 WebSocket: ${ws.url}`, 'info');

            ws.onopen = async () => {
                log(`WebSocket 已连接 [${windowId}]`, 'success');
                try {
                    const offer = await pc.createOffer({
                        offerToReceiveVideo: true,
                        offerToReceiveAudio: false
                    });
                    await pc.setLocalDescription(offer);
                    
                    ws.send(JSON.stringify({
                        type: 'webrtc',
                        value: {
                            type: 'offer',
                            sdp: pc.localDescription.sdp
                        }
                    }));
                    log(`已发送 Offer [${windowId}]`, 'info');
                } catch (err) {
                    log(`创建 Offer 失败 [${windowId}]: ${err.message}`, 'error');
                    loading.classList.add('hidden');
                    statusDot.className = 'status-dot error';
                    statusText.textContent = '创建 Offer 失败';
                }
            };

            ws.onmessage = async (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    log(`收到消息 [${windowId}]: ${msg.type}`, 'info');

                    if (msg.type === 'webrtc') {
                        if (msg.value.type === 'answer') {
                            await pc.setRemoteDescription(new RTCSessionDescription(msg.value));
                            log(`收到 Answer [${windowId}]`, 'success');
                        }
                    } else if (msg.type === 'webrtc/candidate') {
                        await pc.addIceCandidate(new RTCIceCandidate({
                            candidate: msg.value
                        }));
                    } else if (msg.type === 'error') {
                        log(`错误 [${windowId}]: ${msg.value}`, 'error');
                        loading.classList.add('hidden');
                        statusDot.className = 'status-dot error';
                        statusText.textContent = '错误：' + msg.value;
                    }
                } catch (err) {
                    log(`处理消息失败 [${windowId}]: ${err.message}`, 'error');
                }
            };

            ws.onerror = (err) => {
                log(`WebSocket 错误 [${windowId}]`, 'error');
                loading.classList.add('hidden');
                statusDot.className = 'status-dot error';
                statusText.textContent = 'WebSocket 错误';
            };

            ws.onclose = () => {
                log(`WebSocket 已关闭 [${windowId}]`, 'warning');
            };

            const windowData = windows.get(windowId);
            if (windowData) {
                windowData.pc = pc;
                windowData.ws = ws;
            }
        }

        function stopPlayback(windowId) {
            const windowData = windows.get(windowId);
            if (windowData) {
                if (windowData.ws) {
                    windowData.ws.close();
                    windowData.ws = null;
                }
                if (windowData.pc) {
                    windowData.pc.close();
                    windowData.pc = null;
                }
            }
        }

        function togglePlay(windowId) {
            const windowData = windows.get(windowId);
            const video = document.getElementById(`video-${windowId}`);
            if (video && windowData) {
                if (video.paused) {
                    video.play();
                } else {
                    video.pause();
                }
            } else if (!windowData) {
                showToast('窗口未连接', 'error');
            }
        }

        function startKeepAlive(windowId, taskId) {
            const interval = 25000;
            
            const timer = setInterval(async () => {
                if (windows.has(windowId)) {
                    try {
                        await fetch(`${getServerUrl()}/api/rtsp/flv/keepLive`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ taskId })
                        });
                    } catch (err) {
                        log(`保活失败 [${windowId}]: ${err.message}`, 'warning');
                    }
                } else {
                    clearInterval(timer);
                }
            }, interval);

            const windowData = windows.get(windowId);
            if (windowData) {
                windowData.keepAliveTimer = timer;
            }
        }

        function removeWindow(windowId) {
            if (!confirm(`确定要删除窗口 ${windowId} 吗？`)) return;

            const windowData = windows.get(windowId);
            if (windowData && windowData.taskId) {
                fetch(`${getServerUrl()}/api/rtsp/flv/delete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ taskId: windowData.taskId })
                }).catch(console.error);
            }

            stopPlayback(windowId);
            windows.delete(windowId);

            const windowEl = document.getElementById(`window-${windowId}`);
            if (windowEl) windowEl.remove();

            updateLayout();
            updateWindowCount();
            showToast(`已删除：${windowId}`, 'info');
        }

        function stopAll() {
            if (!confirm('确定要停止所有窗口吗？')) return;

            windows.forEach((data, windowId) => {
                if (data.taskId) {
                    fetch(`${getServerUrl()}/api/rtsp/flv/delete`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ taskId: data.taskId })
                    }).catch(console.error);
                }
                stopPlayback(windowId);
            });

            windows.clear();
            windowIdCounter = 0;

            document.getElementById('gridContainer').innerHTML = `
                <div class="add-window-card" onclick="showAddModal()">
                    <div class="add-icon">➕</div>
                    <div class="add-text">点击添加窗口</div>
                </div>
            `;
            
            updateWindowCount();
            showToast('已停止所有窗口', 'info');
        }

        function updateLayout() {
            const container = document.getElementById('gridContainer');
            if (windows.size === 0 && !container.querySelector('.add-window-card')) {
                container.innerHTML = `
                    <div class="add-window-card" onclick="showAddModal()">
                        <div class="add-icon">➕</div>
                        <div class="add-text">点击添加窗口</div>
                    </div>
                `;
            }
        }

        async function checkServerStatus() {
            try {
                const response = await fetch(`${getServerUrl()}/api/health`);
                const data = await response.json();
                isConnected = true;
                log(`服务状态：${data.status || 'OK'}，当前流数：${data.streams || 0}`, 'success');
            } catch (error) {
                isConnected = false;
                log(`无法连接服务：${error.message}`, 'error');
            }
        }

        window.addEventListener('beforeunload', () => {
            windows.forEach((data) => {
                if (data.ws) data.ws.close();
                if (data.pc) data.pc.close();
                if (data.keepAliveTimer) clearInterval(data.keepAliveTimer);
            });
            windows.clear();
        });

        // 初始化
        log('WebRTC 多窗口大屏已加载', 'success');
        log(`默认服务器地址：${getServerUrl()}`, 'info');
        
        if (window.location.protocol === 'file:') {
            log('⚠️ 检测到文件协议，请通过 HTTP 访问页面', 'warning');
            showToast('请通过 HTTP 访问此页面 (http://localhost:1984/...)', 'warning');
        }
        
        updateLayout();
        checkServerStatus();
        setInterval(checkServerStatus, 30000);
    </script>
</body>
</html>
