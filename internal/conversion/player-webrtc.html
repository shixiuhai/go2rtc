<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTSP 转 WebRTC 多路播放器</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #fff;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00d9ff;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }

        .panel {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .panel-title {
            font-size: 18px;
            margin-bottom: 15px;
            color: #00d9ff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .panel-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: #00d9ff;
            border-radius: 2px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-group input {
            flex: 1;
            padding: 12px 20px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #00d9ff;
            box-shadow: 0 0 15px rgba(0, 217, 255, 0.3);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00d9ff 0%, #0099cc 100%);
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4757 0%, #cc3344 100%);
            color: #fff;
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255, 71, 87, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #2ed573 0%, #1ea055 100%);
            color: #fff;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(46, 213, 115, 0.4);
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffa502 0%, #cc8400 100%);
            color: #000;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }

        .video-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(0, 217, 255, 0.2);
            transition: all 0.3s;
        }

        .video-card:hover {
            border-color: #00d9ff;
            box-shadow: 0 5px 20px rgba(0, 217, 255, 0.3);
        }

        .video-card.active {
            border-color: #2ed573;
            box-shadow: 0 0 20px rgba(46, 213, 115, 0.3);
        }

        .video-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .video-title {
            font-size: 14px;
            font-weight: 600;
            color: #00d9ff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 200px;
        }

        .video-actions {
            display: flex;
            gap: 8px;
        }

        .video-body {
            position: relative;
            background: #000;
        }

        .video-body video {
            width: 100%;
            height: auto;
            display: block;
        }

        .video-status {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            background: rgba(0, 0, 0, 0.3);
            font-size: 12px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.active {
            background: #2ed573;
            animation: pulse 2s infinite;
        }

        .status-dot.error {
            background: #ff4757;
        }

        .status-dot.connecting {
            background: #ffa502;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .task-list {
            display: grid;
            gap: 10px;
        }

        .task-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .task-info {
            flex: 1;
        }

        .task-id {
            color: #00d9ff;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .task-path {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            word-break: break-all;
        }

        .task-actions {
            display: flex;
            gap: 10px;
            margin-left: 15px;
        }

        .config-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }

        .config-item {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .config-item label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }

        .config-item input {
            padding: 10px;
            border: 2px solid rgba(0, 217, 255, 0.3);
            border-radius: 6px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
        }

        .config-item input:focus {
            outline: none;
            border-color: #00d9ff;
        }

        .log-container {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .log-entry {
            padding: 5px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .log-entry:last-child {
            border-bottom: none;
        }

        .log-info { color: #00d9ff; }
        .log-success { color: #2ed573; }
        .log-error { color: #ff4757; }
        .log-warning { color: #ffa502; }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: rgba(255, 255, 255, 0.5);
            grid-column: 1 / -1;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .stats-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            flex: 1;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #00d9ff;
        }

        .stat-label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 5px;
        }

        .close-btn {
            background: none;
            border: none;
            color: #ff4757;
            cursor: pointer;
            font-size: 18px;
            padding: 0 5px;
            transition: all 0.3s;
        }

        .close-btn:hover {
            transform: scale(1.2);
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 217, 255, 0.3);
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 10px;
            font-size: 12px;
            color: #00d9ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📺 RTSP 转 WebRTC 多路播放器</h1>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="playingCount">0</div>
                <div class="stat-label">正在播放</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalTasks">0</div>
                <div class="stat-label">总任务数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="serverStatus">-</div>
                <div class="stat-label">服务状态</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">服务配置</div>
            <div class="config-section">
                <div class="config-item">
                    <label>go2rtc 服务地址</label>
                    <input type="text" id="serverUrl" value="http://localhost:1984" placeholder="http://localhost:1984">
                </div>
                <div class="config-item">
                    <label>保活间隔 (秒)</label>
                    <input type="number" id="keepAliveInterval" value="25" min="10" max="60">
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">添加转换任务</div>
            <div class="input-group">
                <input type="text" id="rtspUrl" placeholder="rtsp://192.168.6.2:8080/h264.sdp" 
                       value="rtsp://192.168.6.2:8080/h264.sdp">
                <button class="btn btn-primary" onclick="addTask()" id="addBtn">
                    ➕ 添加路
                </button>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">
                播放窗口
                <button class="btn btn-small btn-warning" onclick="stopAll()" style="margin-left: auto;">
                    ⏹ 全部停止
                </button>
            </div>
            <div id="videoGrid" class="video-grid">
                <div class="empty-state">
                    <div class="empty-state-icon">📹</div>
                    <div>暂无播放窗口，点击上方"添加路"按钮添加 RTSP 流</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">
                任务列表
                <button class="btn btn-small btn-primary" onclick="loadTaskList()" style="margin-left: auto;">
                    🔄 刷新
                </button>
            </div>
            <div id="taskList" class="task-list">
                <div class="empty-state">
                    <div class="empty-state-icon">📋</div>
                    <div>暂无任务</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-title">运行日志</div>
            <div class="log-container" id="logContainer"></div>
        </div>
    </div>

    <script>
        const players = new Map();

        function log(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const now = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${now}] ${message}`;
            container.insertBefore(entry, container.firstChild);
            
            while (container.children.length > 100) {
                container.removeChild(container.lastChild);
            }
        }

        function getServerUrl() {
            const custom = document.getElementById('serverUrl').value.trim();
            if (custom) {
                return custom.replace(/\/$/, '');
            }
            // 如果是 file:// 协议，提示用户输入服务器地址
            if (window.location.protocol === 'file:') {
                const defaultUrl = 'http://localhost:1984';
                log('检测到文件协议，请确保下方服务器地址正确', 'warning');
                return defaultUrl;
            }
            return window.location.origin;
        }

        function updateStats() {
            const playingCount = players.size;
            document.getElementById('playingCount').textContent = playingCount;
            document.getElementById('totalTasks').textContent = playingCount;
        }

        function createVideoCard(taskId, rtspUrl) {
            return `
                <div class="video-card" id="card-${taskId}" data-task-id="${taskId}">
                    <div class="video-header">
                        <div class="video-title" title="${rtspUrl}">📹 ${taskId}</div>
                        <div class="video-actions">
                            <button class="btn btn-small btn-success" onclick="togglePlay('${taskId}')" id="playBtn-${taskId}">
                                ▶ 播放
                            </button>
                            <button class="btn btn-small btn-warning" onclick="keepAliveTask('${taskId}')">
                                💓 保活
                            </button>
                            <button class="close-btn" onclick="removeCard('${taskId}')" title="关闭">✕</button>
                        </div>
                    </div>
                    <div class="video-body">
                        <video id="video-${taskId}" controls autoplay muted playsinline></video>
                        <div class="loading-overlay hidden" id="loading-${taskId}">
                            <div class="spinner"></div>
                            <div class="loading-text">连接中...</div>
                        </div>
                    </div>
                    <div class="video-status">
                        <div class="status-indicator">
                            <div class="status-dot" id="statusDot-${taskId}"></div>
                            <span id="statusText-${taskId}">未播放</span>
                        </div>
                        <span style="color: rgba(255,255,255,0.5); font-size: 11px;">${rtspUrl}</span>
                    </div>
                </div>
            `;
        }

        async function addTask() {
            const rtspUrl = document.getElementById('rtspUrl').value.trim();
            if (!rtspUrl) {
                log('请输入 RTSP 地址', 'error');
                return;
            }

            const serverUrl = getServerUrl();
            const addBtn = document.getElementById('addBtn');
            addBtn.disabled = true;
            addBtn.textContent = '⏳ 添加中...';

            try {
                log(`正在添加任务：${rtspUrl}`, 'info');
                
                const response = await fetch(`${serverUrl}/api/rtsp/flv/add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ path: rtspUrl })
                });

                const data = await response.json();

                if (data.code === 200) {
                    log(`任务添加成功！Task ID: ${data.taskId}`, 'success');
                    addVideoCard(data.taskId, rtspUrl, data.webrtcUrl);
                    startPlayback(data.taskId, data.webrtcUrl);
                    startKeepAlive(data.taskId);
                    updateStats();
                    loadTaskList();
                } else {
                    log(`任务添加失败：${data.result}`, 'error');
                }
            } catch (error) {
                log(`请求失败：${error.message}`, 'error');
            } finally {
                addBtn.disabled = false;
                addBtn.textContent = '➕ 添加路';
            }
        }

        function addVideoCard(taskId, rtspUrl, webrtcUrl) {
            const grid = document.getElementById('videoGrid');
            const emptyState = grid.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            if (document.getElementById(`card-${taskId}`)) {
                log(`卡片已存在：${taskId}`, 'warning');
                return;
            }

            grid.insertAdjacentHTML('beforeend', createVideoCard(taskId, rtspUrl));
            log(`视频卡片已添加：${taskId}`, 'success');
        }

        function startPlayback(taskId, webrtcUrl) {
            const videoElement = document.getElementById(`video-${taskId}`);
            const statusDot = document.getElementById(`statusDot-${taskId}`);
            const statusText = document.getElementById(`statusText-${taskId}`);
            const playBtn = document.getElementById(`playBtn-${taskId}`);
            const card = document.getElementById(`card-${taskId}`);
            const loading = document.getElementById(`loading-${taskId}`);

            if (players.has(taskId)) {
                stopPlayback(taskId);
            }

            const streamName = 'conv_' + taskId;
            const wsUrl = `ws://${window.location.host}/api/ws?src=${streamName}`;
            
            const pc = new RTCPeerConnection({
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun.cloudflare.com:3478' }
                ]
            });

            let ws = null;
            let isConnected = false;

            loading.classList.remove('hidden');
            statusDot.className = 'status-dot connecting';
            statusText.textContent = '连接中...';

            pc.ontrack = (event) => {
                log(`收到视频流 [${taskId}]`, 'success');
                videoElement.srcObject = event.streams[0];
                isConnected = true;
                loading.classList.add('hidden');
                statusDot.className = 'status-dot active';
                statusText.textContent = '播放中';
                card.classList.add('active');
                if (playBtn) playBtn.textContent = '⏸ 暂停';
            };

            pc.onicecandidate = (event) => {
                if (event.candidate && ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({
                        type: 'webrtc/candidate',
                        value: event.candidate.candidate
                    }));
                }
            };

            pc.onconnectionstatechange = () => {
                log(`连接状态 [${taskId}]: ${pc.connectionState}`, 'info');
                if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
                    loading.classList.add('hidden');
                    statusDot.className = 'status-dot error';
                    statusText.textContent = '连接失败';
                    card.classList.remove('active');
                } else if (pc.connectionState === 'connected') {
                    loading.classList.add('hidden');
                    statusDot.className = 'status-dot active';
                    statusText.textContent = '播放中';
                }
            };

            ws = new WebSocket(wsUrl);

            ws.onopen = async () => {
                log(`WebSocket 已连接 [${taskId}]`, 'info');
                try {
                    const offer = await pc.createOffer({
                        offerToReceiveVideo: true,
                        offerToReceiveAudio: true
                    });
                    await pc.setLocalDescription(offer);
                    
                    ws.send(JSON.stringify({
                        type: 'webrtc',
                        value: {
                            type: 'offer',
                            sdp: pc.localDescription.sdp
                        }
                    }));
                } catch (err) {
                    log(`创建 Offer 失败 [${taskId}]: ${err.message}`, 'error');
                    loading.classList.add('hidden');
                    statusDot.className = 'status-dot error';
                    statusText.textContent = '创建 Offer 失败';
                }
            };

            ws.onmessage = async (event) => {
                try {
                    const msg = JSON.parse(event.data);

                    if (msg.type === 'webrtc') {
                        if (msg.value.type === 'answer') {
                            await pc.setRemoteDescription(new RTCSessionDescription(msg.value));
                            log(`收到 Answer [${taskId}]`, 'success');
                        }
                    } else if (msg.type === 'webrtc/candidate') {
                        await pc.addIceCandidate(new RTCIceCandidate({
                            candidate: msg.value
                        }));
                    } else if (msg.type === 'error') {
                        log(`错误 [${taskId}]: ${msg.value}`, 'error');
                        loading.classList.add('hidden');
                        statusDot.className = 'status-dot error';
                        statusText.textContent = '错误：' + msg.value;
                    }
                } catch (err) {
                    log(`处理消息失败 [${taskId}]: ${err.message}`, 'error');
                }
            };

            ws.onerror = (err) => {
                log(`WebSocket 错误 [${taskId}]`, 'error');
                loading.classList.add('hidden');
                statusDot.className = 'status-dot error';
                statusText.textContent = 'WebSocket 错误';
            };

            ws.onclose = () => {
                log(`WebSocket 已关闭 [${taskId}]`, 'warning');
            };

            players.set(taskId, {
                pc,
                ws,
                rtspUrl,
                webrtcUrl,
                keepAliveTimer: null,
                isConnected: false
            });
        }

        function stopPlayback(taskId) {
            const playerData = players.get(taskId);
            if (playerData) {
                if (playerData.ws) {
                    playerData.ws.close();
                }
                if (playerData.pc) {
                    playerData.pc.close();
                }
            }
            players.delete(taskId);
        }

        function togglePlay(taskId) {
            const playerData = players.get(taskId);
            const playBtn = document.getElementById(`playBtn-${taskId}`);
            const statusText = document.getElementById(`statusText-${taskId}`);

            if (playerData && playerData.pc) {
                const video = document.getElementById(`video-${taskId}`);
                if (video.paused) {
                    video.play();
                    if (playBtn) playBtn.textContent = '⏸ 暂停';
                    statusText.textContent = '播放中';
                } else {
                    video.pause();
                    if (playBtn) playBtn.textContent = '▶ 播放';
                    statusText.textContent = '已暂停';
                }
            } else {
                const webrtcUrl = playerData ? playerData.webrtcUrl : null;
                if (webrtcUrl) {
                    startPlayback(taskId, webrtcUrl);
                }
            }
        }

        function startKeepAlive(taskId) {
            stopKeepAlive(taskId);
            
            const interval = parseInt(document.getElementById('keepAliveInterval').value) * 1000;
            
            const timer = setInterval(async () => {
                if (players.has(taskId)) {
                    await keepAliveRequest(taskId);
                } else {
                    clearInterval(timer);
                }
            }, interval);

            const playerData = players.get(taskId);
            if (playerData) {
                playerData.keepAliveTimer = timer;
            }
        }

        function stopKeepAlive(taskId) {
            const playerData = players.get(taskId);
            if (playerData && playerData.keepAliveTimer) {
                clearInterval(playerData.keepAliveTimer);
                playerData.keepAliveTimer = null;
            }
        }

        async function keepAliveRequest(taskId) {
            const serverUrl = getServerUrl();
            
            try {
                const response = await fetch(`${serverUrl}/api/rtsp/flv/keepLive`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ taskId })
                });

                const data = await response.json();
                if (data.code !== 200) {
                    log(`保活失败 [${taskId}]: ${data.result}`, 'warning');
                }
            } catch (error) {
                log(`保活请求失败 [${taskId}]: ${error.message}`, 'error');
            }
        }

        function keepAliveTask(taskId) {
            log(`手动保活任务：${taskId}`, 'info');
            keepAliveRequest(taskId);
        }

        async function removeCard(taskId) {
            if (!confirm(`确定要停止并删除任务 ${taskId} 吗？`)) return;

            const serverUrl = getServerUrl();
            
            try {
                await fetch(`${serverUrl}/api/rtsp/flv/delete`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ taskId })
                });
            } catch (error) {
                log(`删除请求失败：${error.message}`, 'error');
            }

            stopPlayback(taskId);
            stopKeepAlive(taskId);

            const card = document.getElementById(`card-${taskId}`);
            if (card) {
                card.remove();
            }

            log(`任务已删除：${taskId}`, 'success');
            updateStats();
            loadTaskList();

            const grid = document.getElementById('videoGrid');
            if (grid.children.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📹</div>
                        <div>暂无播放窗口，点击上方"添加路"按钮添加 RTSP 流</div>
                    </div>
                `;
            }
        }

        async function stopAll() {
            if (!confirm('确定要停止所有播放吗？')) return;

            const taskIds = Array.from(players.keys());
            for (const taskId of taskIds) {
                await removeCard(taskId);
            }
        }

        async function loadTaskList() {
            const serverUrl = getServerUrl();
            const taskListEl = document.getElementById('taskList');

            try {
                const response = await fetch(`${serverUrl}/api/rtsp/flv/list`);
                const data = await response.json();

                if (data.code === 200 && data.num > 0) {
                    let html = '';
                    for (const [taskId, info] of Object.entries(data.taskDict)) {
                        const expires = new Date(info.expires * 1000).toLocaleString();
                        html += `
                            <div class="task-item">
                                <div class="task-info">
                                    <div class="task-id">📌 ${taskId}</div>
                                    <div class="task-path">${info.rtspPath}</div>
                                    <div class="task-path">过期时间：${expires}</div>
                                </div>
                                <div class="task-actions">
                                    <button class="btn btn-small btn-success" onclick="focusCard('${taskId}')">
                                        📺 聚焦
                                    </button>
                                    <button class="btn btn-small btn-warning" onclick="keepAliveTask('${taskId}')">
                                        💓 保活
                                    </button>
                                    <button class="btn btn-small btn-danger" onclick="removeCard('${taskId}')">
                                        🗑 删除
                                    </button>
                                </div>
                            </div>
                        `;
                    }
                    taskListEl.innerHTML = html;
                    log(`已加载 ${data.num} 个任务`, 'success');
                } else {
                    taskListEl.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📋</div>
                            <div>暂无任务</div>
                        </div>
                    `;
                }
            } catch (error) {
                log(`加载任务列表失败：${error.message}`, 'error');
            }
        }

        function focusCard(taskId) {
            const card = document.getElementById(`card-${taskId}`);
            if (card) {
                card.scrollIntoView({ behavior: 'smooth', block: 'center' });
                card.style.borderColor = '#00d9ff';
                setTimeout(() => {
                    card.style.borderColor = '';
                }, 2000);
            }
        }

        window.addEventListener('beforeunload', () => {
            players.forEach((playerData, taskId) => {
                if (playerData.ws) {
                    playerData.ws.close();
                }
                if (playerData.pc) {
                    playerData.pc.close();
                }
                if (playerData.keepAliveTimer) {
                    clearInterval(playerData.keepAliveTimer);
                }
            });
            players.clear();
        });

        async function checkServerStatus() {
            const serverUrl = getServerUrl();
            try {
                const response = await fetch(`${serverUrl}/api/health`);
                const data = await response.json();
                document.getElementById('serverStatus').textContent = data.status || 'OK';
                document.getElementById('serverStatus').style.color = '#2ed573';
            } catch (error) {
                document.getElementById('serverStatus').textContent = '离线';
                document.getElementById('serverStatus').style.color = '#ff4757';
            }
        }

        // 检测文件协议
        if (window.location.protocol === 'file:') {
            log('⚠️ 检测到您直接用文件方式打开页面，这会导致跨域问题', 'error');
            log('请通过 HTTP 访问：http://localhost:1984/internal/conversion/player-webrtc.html', 'warning');
            log('或者在下方配置正确的 go2rtc 服务地址', 'warning');
            alert('请用 HTTP 方式访问此页面！\n\n1. 启动 go2rtc\n2. 浏览器访问：http://localhost:1984/internal/conversion/player-webrtc.html\n\n直接双击打开会导致跨域问题，无法使用。');
        }

        log('WebRTC 多路播放器已初始化', 'success');
        log(`默认服务地址：${getServerUrl()}`, 'info');
        checkServerStatus();
        setInterval(checkServerStatus, 30000);
        loadTaskList();
    </script>
</body>
</html>
